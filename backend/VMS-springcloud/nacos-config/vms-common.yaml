# Nacos 共享配置文件
# 在 Nacos 控制台创建，Data ID: vms-common.yaml, Group: DEFAULT_GROUP

# ==================== 数据源配置 ====================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vms_cloud?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 135781012q

  # ==================== Redis 配置 ====================
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

# ==================== Knife4j 配置 ====================
knife4j:
  enable: true
  production: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ==================== 日志配置 ====================
logging:
  level:
    cn.yznu: debug

# ==================== Actuator 配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info
