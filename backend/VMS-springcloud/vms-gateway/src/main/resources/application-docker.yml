server:
  port: 8080

spring:
  application:
    name: vms-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        file-extension: yaml
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: vms-user
          uri: lb://vms-user
          predicates:
            - Path=/user/**
        - id: vms-video
          uri: lb://vms-video
          predicates:
            - Path=/video/**,/category/**,/tag/**,/statistics/**
        - id: vms-interaction
          uri: lb://vms-interaction
          predicates:
            - Path=/comment/**,/danmaku/**,/interact/**,/history/**
        - id: vms-operation
          uri: lb://vms-operation
          predicates:
            - Path=/banner/**
        - id: vms-file
          uri: lb://vms-file
          predicates:
            - Path=/file/**,/files/**,/media/**

        # ==================== 接口文档聚合路由 ====================
        - id: vms-user-docs
          uri: lb://vms-user
          predicates:
            - Path=/docs/user/v3/api-docs
          filters:
            - RewritePath=/docs/user/v3/api-docs, /v3/api-docs
        - id: vms-video-docs
          uri: lb://vms-video
          predicates:
            - Path=/docs/video/v3/api-docs
          filters:
            - RewritePath=/docs/video/v3/api-docs, /v3/api-docs
        - id: vms-interaction-docs
          uri: lb://vms-interaction
          predicates:
            - Path=/docs/interaction/v3/api-docs
          filters:
            - RewritePath=/docs/interaction/v3/api-docs, /v3/api-docs
        - id: vms-operation-docs
          uri: lb://vms-operation
          predicates:
            - Path=/docs/operation/v3/api-docs
          filters:
            - RewritePath=/docs/operation/v3/api-docs, /v3/api-docs
        - id: vms-file-docs
          uri: lb://vms-file
          predicates:
            - Path=/docs/file/v3/api-docs
          filters:
            - RewritePath=/docs/file/v3/api-docs, /v3/api-docs

  # Redis 配置 (用于限流等功能)
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      database: 0

jwt:
  secret: ${JWT_SECRET:VmsSpringCloudSecretKeyForJwtTokenGeneration2024}
  expiration: 86400000
  ignore-urls:
    - /user/login
    - /user/register
    - /video/list
    - /video/detail/**
    - /video/hot
    - /video/play/**
    - /category/list
    - /category/tree
    - /tag/list
    - /tag/hot
    - /banner/list
    - /files/**
    - /media/**
    # 接口文档相关的路径
    - /doc.html
    - /webjars/**
    - /v3/api-docs/**
    - /docs/**
    - /swagger-resources/**
# ==================== Knife4j 网关聚合配置 ====================
knife4j:
  enable: true
  gateway:
    enabled: true
    # 指定具体的服务路由聚合
    routes:
      - name: 用户服务
        url: /docs/user/v3/api-docs
        service-name: vms-user
        order: 1
      - name: 视频服务
        url: /docs/video/v3/api-docs
        service-name: vms-video
        order: 2
      - name: 互动服务
        url: /docs/interaction/v3/api-docs
        service-name: vms-interaction
        order: 3
      - name: 运营服务
        url: /docs/operation/v3/api-docs
        service-name: vms-operation
        order: 4
      - name: 文件服务
        url: /docs/file/v3/api-docs
        service-name: vms-file
        order: 5


logging:
  level:
    cn.yznu: info
  file:
    path: /app/logs
